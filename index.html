:root {

<script>
// ─── State ────────────────────────────────────────────────────────────────────
let pdfFile = null;
let textChunks = [];
let currentChunk = 0;
let isPlaying = false;
let utterance = null;
let voices = [];
let playbackRate = 1.0;
const speedSteps = [0.75, 1.0, 1.25, 1.5, 1.75, 2.0];
let speedIdx = 1;
let elapsed = 0;
let startTime = 0;
let totalEstSecs = 0;
let timerInterval = null;
let waveInterval = null;

// ─── DOM refs ─────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const apiKeyInput = $('apiKey');
const dropZone = $('dropZone');
const fileInput = $('fileInput');
const fileInfo = $('fileInfo');
const convertBtn = $('convertBtn');
const progressSection = $('progressSection');
const player = $('player');
const playBtn = $('playBtn');

// Load saved key
const savedKey = localStorage.getItem('audex_api_key');
if (savedKey) apiKeyInput.value = savedKey;

// ─── Voices ───────────────────────────────────────────────────────────────────
function loadVoices() {
  let all = speechSynthesis.getVoices();
  voices = all.filter(v => v.lang.startsWith('en'));
  if (!voices.length) voices = all;
  const sel = $('voiceSelect');
  sel.innerHTML = voices.map((v, i) =>
    `<option value="${i}">${v.name} (${v.lang})</option>`
  ).join('') || '<option>No voices found</option>';
  const pref = voices.findIndex(v => /google|premium|natural/i.test(v.name));
  if (pref > -1) sel.value = pref;
}
speechSynthesis.onvoiceschanged = loadVoices;
loadVoices();

// ─── Controls ─────────────────────────────────────────────────────────────────
$('saveKeyBtn').addEventListener('click', () => {
  const k = apiKeyInput.value.trim();
  if (!k) return showToast('Please enter an API key', 'error');
  localStorage.setItem('audex_api_key', k);
  showToast('API key saved', 'success');
  checkReady();
});

$('speedRange').addEventListener('input', () => {
  $('speedVal').textContent = parseFloat($('speedRange').value).toFixed(1) + '×';
});
$('pitchRange').addEventListener('input', () => {
  $('pitchVal').textContent = parseFloat($('pitchRange').value).toFixed(1);
});

// ─── File handling ─────────────────────────────────────────────────────────────
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if (f) handleFile(f);
});
fileInput.addEventListener('change', () => { if (fileInput.files[0]) handleFile(fileInput.files[0]); });

$('clearFile').addEventListener('click', () => {
  pdfFile = null;
  fileInput.value = '';
  fileInfo.classList.remove('visible');
  dropZone.style.display = '';
  checkReady();
  player.classList.remove('visible');
  progressSection.classList.remove('visible');
  stopAudio();
});

function handleFile(f) {
  if (!f.name.toLowerCase().endsWith('.pdf')) return showToast('Please upload a PDF file', 'error');
  if (f.size > 12 * 1024 * 1024) return showToast('File exceeds 10 MB limit', 'error');
  pdfFile = f;
  $('fileName').textContent = f.name;
  $('fileSize').textContent = (f.size / 1024).toFixed(1) + ' KB · PDF';
  fileInfo.classList.add('visible');
  dropZone.style.display = 'none';
  checkReady();
}

function checkReady() {
  const hasKey = !!(apiKeyInput.value.trim() || localStorage.getItem('audex_api_key'));
  convertBtn.disabled = !(pdfFile && hasKey);
}
apiKeyInput.addEventListener('input', checkReady);

// ─── Convert ──────────────────────────────────────────────────────────────────
convertBtn.addEventListener('click', startConvert);

async function startConvert() {
  const apiKey = apiKeyInput.value.trim() || localStorage.getItem('audex_api_key');
  if (!apiKey || !pdfFile) return;

  convertBtn.disabled = true;
  stopAudio();
  player.classList.remove('visible');
  progressSection.classList.add('visible');
  $('progressLog').innerHTML = '';
  setProgress(0, 'Reading PDF…');
  setStatus('Processing', true);

  try {
    logMsg('Reading PDF file…');
    const base64 = await fileToBase64(pdfFile);
    setProgress(15, 'Sending to Claude API…');

    logMsg('Extracting text with Claude Haiku…');
    const extractedText = await extractTextFromPDF(apiKey, base64);
    setProgress(65, 'Chunking into sections…');

    const chunkSize = parseInt($('chunkSelect').value);
    textChunks = chunkText(extractedText, chunkSize);
    logMsg(`Extracted ${extractedText.length.toLocaleString()} chars → ${textChunks.length} sections`);
    setProgress(85, 'Building player…');

    const rate = parseFloat($('speedRange').value);
    totalEstSecs = Math.round(extractedText.length / (14 * rate));

    setProgress(100, 'Ready!');
    logMsg('✓ Audiobook ready — press play to listen');

    buildPlayer(pdfFile.name.replace(/\.pdf$/i, ''));
    player.classList.add('visible');
    setStatus('Ready', false);
    showToast('Audiobook ready!', 'success');
    player.scrollIntoView({ behavior: 'smooth', block: 'start' });

  } catch (err) {
    setProgress(0, 'Error occurred');
    logMsg('✗ ' + err.message, true);
    showToast(err.message, 'error');
    setStatus('Error', false);
    convertBtn.disabled = false;
  }
}

async function extractTextFromPDF(apiKey, base64) {
  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
    },
    body: JSON.stringify({
      model: 'claude-haiku-4-5-20251001',
      max_tokens: 8000,
      messages: [{
        role: 'user',
        content: [
          {
            type: 'document',
            source: { type: 'base64', media_type: 'application/pdf', data: base64 }
          },
          {
            type: 'text',
            text: `Extract ALL readable text from this PDF for text-to-speech conversion.
Output ONLY the plain text content — no labels, no preamble, no commentary.
Preserve paragraph breaks with double newlines.
Skip page numbers, headers, footers, and decorative elements.
Convert symbols to words: "§" → "section", "%" → "percent", "&" → "and".
Start directly with the document's content.`
          }
        ]
      }]
    })
  });

  if (!response.ok) {
    const err = await response.json().catch(() => ({}));
    throw new Error(err.error?.message || `API error ${response.status}`);
  }

  const data = await response.json();
  const text = data.content?.find(b => b.type === 'text')?.text || '';
  if (!text.trim()) throw new Error('No readable text found in this PDF');
  return text;
}

function chunkText(text, size) {
  const paragraphs = text.split(/\n{2,}/).filter(p => p.trim().length > 20);
  const chunks = [];
  let current = '';
  for (const para of paragraphs) {
    if (current.length + para.length > size && current.length > 0) {
      chunks.push(current.trim());
      current = para;
    } else {
      current += (current ? '\n\n' : '') + para;
    }
  }
  if (current.trim()) chunks.push(current.trim());
  return chunks.length ? chunks : [text.slice(0, size)];
}

// ─── Player ───────────────────────────────────────────────────────────────────
function buildPlayer(title) {
  $('playerTitle').textContent = title;
  $('playerSub').textContent = `${textChunks.length} sections · est. ${fmtTime(totalEstSecs)}`;
  $('timeCurrent').textContent = '0:00';
  $('timeTotal').textContent = fmtTime(totalEstSecs);
  currentChunk = 0;
  elapsed = 0;
  $('timelineFill').style.width = '0%';

  // Waveform
  const wf = $('waveform');
  wf.innerHTML = '';
  for (let i = 0; i < 60; i++) {
    const bar = document.createElement('div');
    bar.className = 'waveform-bar';
    bar.style.height = (Math.random() * 24 + 4) + 'px';
    wf.appendChild(bar);
  }

  buildChapters();
  updateCurrentText();
}

function buildChapters() {
  const el = $('chaptersList');
  el.innerHTML = '<div class="chapters-header">Sections</div>';
  textChunks.forEach((chunk, i) => {
    const item = document.createElement('div');
    item.className = 'chapter-item' + (i === currentChunk ? ' active' : '');
    item.innerHTML = `
      <span class="ch-num">${String(i + 1).padStart(2, '0')}</span>
      <span class="ch-title">${chunk.substring(0, 60).replace(/\n/g, ' ')}…</span>
    `;
    item.addEventListener('click', () => jumpTo(i));
    el.appendChild(item);
  });
}

function updateChapterHighlight() {
  document.querySelectorAll('.chapter-item').forEach((el, i) => {
    el.classList.toggle('active', i === currentChunk);
  });
}

function updateCurrentText() {
  const el = $('currentText');
  if (textChunks[currentChunk]) {
    el.textContent = textChunks[currentChunk].substring(0, 200).replace(/\n/g, ' ');
  }
}

// ─── Playback ─────────────────────────────────────────────────────────────────
playBtn.addEventListener('click', togglePlay);
$('prevBtn').addEventListener('click', () => jumpTo(currentChunk - 1));
$('nextBtn').addEventListener('click', () => jumpTo(currentChunk + 1));
$('rewindBtn').addEventListener('click', () => {
  elapsed = Math.max(0, elapsed - 10);
  startTime = Date.now() - elapsed * 1000;
});
$('fwdBtn').addEventListener('click', () => {
  elapsed = Math.min(totalEstSecs, elapsed + 10);
  startTime = Date.now() - elapsed * 1000;
});

$('speedCycle').addEventListener('click', () => {
  speedIdx = (speedIdx + 1) % speedSteps.length;
  playbackRate = speedSteps[speedIdx];
  $('speedCycle').textContent = playbackRate.toFixed(2).replace('.00', '').replace(/\.(\d)$/, '.$10').replace('0', '') + '×';
  $('speedCycle').textContent = playbackRate + '×';
  if (utterance) utterance.rate = playbackRate;
});

function togglePlay() {
  if (isPlaying) pauseAudio();
  else if (speechSynthesis.paused) {
    speechSynthesis.resume();
    isPlaying = true;
    playBtn.textContent = '⏸';
    startTimer();
    animateWave(true);
  } else {
    playChunk(currentChunk);
  }
}

function pauseAudio() {
  speechSynthesis.pause();
  isPlaying = false;
  playBtn.textContent = '▶';
  stopTimer();
  animateWave(false);
}

function stopAudio() {
  speechSynthesis.cancel();
  isPlaying = false;
  playBtn.textContent = '▶';
  stopTimer();
  animateWave(false);
}

function jumpTo(idx) {
  if (idx < 0 || idx >= textChunks.length) return;
  stopAudio();
  currentChunk = idx;
  updateChapterHighlight();
  updateCurrentText();
  playChunk(idx);
}

function playChunk(idx) {
  if (idx >= textChunks.length) {
    stopAudio();
    showToast('Finished!', 'success');
    setStatus('Done', false);
    return;
  }
  speechSynthesis.cancel();
  currentChunk = idx;
  updateChapterHighlight();
  updateCurrentText();

  utterance = new SpeechSynthesisUtterance(textChunks[idx]);
  const vi = parseInt($('voiceSelect').value) || 0;
  if (voices[vi]) utterance.voice = voices[vi];
  utterance.rate = playbackRate;
  utterance.pitch = parseFloat($('pitchRange').value);

  utterance.onstart = () => {
    isPlaying = true;
    playBtn.textContent = '⏸';
    animateWave(true);
    startTimer();
    setStatus('Playing', true);
  };

  utterance.onend = () => {
    currentChunk++;
    if (currentChunk < textChunks.length) playChunk(currentChunk);
    else { stopAudio(); setStatus('Done', false); showToast('Audiobook complete!', 'success'); }
  };

  utterance.onerror = e => {
    if (e.error !== 'interrupted') {
      showToast('Speech error: ' + e.error, 'error');
      setStatus('Error', false);
    }
  };

  speechSynthesis.speak(utterance);
}

// ─── Timer ────────────────────────────────────────────────────────────────────
function startTimer() {
  stopTimer();
  startTime = Date.now() - elapsed * 1000;
  timerInterval = setInterval(() => {
    elapsed = (Date.now() - startTime) / 1000;
    const pct = Math.min((elapsed / totalEstSecs) * 100, 100);
    $('timelineFill').style.width = pct + '%';
    $('timeCurrent').textContent = fmtTime(elapsed);
  }, 250);
}

function stopTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

$('timelineTrack').addEventListener('click', e => {
  const rect = e.currentTarget.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  elapsed = pct * totalEstSecs;
  startTime = Date.now() - elapsed * 1000;
  $('timeCurrent').textContent = fmtTime(elapsed);
  $('timelineFill').style.width = (pct * 100) + '%';
  const targetChunk = Math.max(0, Math.min(Math.floor(pct * textChunks.length), textChunks.length - 1));
  stopAudio();
  currentChunk = targetChunk;
  playChunk(targetChunk);
});

// ─── Waveform ─────────────────────────────────────────────────────────────────
function animateWave(active) {
  const bars = document.querySelectorAll('.waveform-bar');
  if (active) {
    if (waveInterval) return;
    waveInterval = setInterval(() => {
      bars.forEach(b => {
        const h = Math.random() * 28 + 4;
        b.style.height = h + 'px';
        b.style.background = h > 18 ? 'var(--accent)' : 'var(--border)';
      });
    }, 110);
  } else {
    if (waveInterval) { clearInterval(waveInterval); waveInterval = null; }
    bars.forEach(b => { b.style.height = '4px'; b.style.background = 'var(--border)'; });
  }
}

// ─── Helpers ──────────────────────────────────────────────────────────────────
function fileToBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = () => rej(new Error('Failed to read file'));
    r.readAsDataURL(file);
  });
}

function fmtTime(secs) {
  secs = Math.max(0, Math.floor(secs));
  return `${Math.floor(secs / 60)}:${String(secs % 60).padStart(2, '0')}`;
}

function setProgress(pct, label) {
  $('progressBar').style.width = pct + '%';
  $('progressPct').textContent = pct + '%';
  if (label) $('progressLabel').textContent = label;
}

function logMsg(msg, error = false) {
  const p = document.createElement('p');
  p.className = error ? '' : 'active';
  p.style.color = error ? 'var(--danger)' : '';
  p.textContent = '› ' + msg;
  $('progressLog').appendChild(p);
  $('progressLog').scrollTop = $('progressLog').scrollHeight;
}

function setStatus(text, active) {
  $('statusText').textContent = text;
  $('statusDot').className = 'dot' + (active ? ' online' : '');
}

let toastTimer = null;
function showToast(msg, type = '') {
  const el = $('toast');
  el.textContent = msg;
  el.className = 'toast show' + (type ? ' ' + type : '');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3200);
}

// ─── PWA ──────────────────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
